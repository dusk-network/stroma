version: "2"

# Baseline meta-linter configuration per
# nanto/knowledge/wiki/themes/project-quality-guidelines.md §"Language-Specific: Go".

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - goconst
    - gocyclo
    - ineffassign
    - misspell
    - prealloc
    - unconvert
    - unparam
    - revive
  settings:
    gocyclo:
      min-complexity: 20
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        # Record is part of the public API (corpus.Record) and passed by value
        # through Normalized/Validate/HashRecord. Switching to pointer receivers
        # is a public API change, and these paths are not hot (per-record at
        # index build time, not per-chunk). Revisit if profiling justifies it.
        - hugeParam
  exclusions:
    generated: lax

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
